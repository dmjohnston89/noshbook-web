<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Noshbook — Track every dish worth remembering</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(145deg, #C8410B, #E8721C);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .icon {
      width: 80px;
      height: 80px;
      border-radius: 18px;
      background: linear-gradient(145deg, #C8410B, #E8721C);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    h1 {
      font-size: 28px;
      font-weight: 800;
      color: #1A1A1A;
      letter-spacing: -0.5px;
    }
    p {
      color: #666;
      margin-top: 10px;
      font-size: 16px;
      line-height: 1.6;
    }
    .badge {
      display: inline-block;
      background: #FEF3EE;
      color: #C8410B;
      font-size: 13px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      margin-top: 20px;
    }
    .links {
      margin-top: 32px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .btn {
      display: block;
      padding: 14px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary {
      background: linear-gradient(135deg, #C8410B, #E8721C);
      color: #fff;
    }
    .btn-secondary {
      background: #F5F5F5;
      color: #333;
    }
    footer {
      margin-top: 28px;
      font-size: 13px;
      color: #aaa;
    }
    footer a { color: #C8410B; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg width="52" height="52" viewBox="0 0 100 100" fill="none">
        <rect x="8" y="23" width="19" height="68" fill="white"/>
        <rect x="9" y="8" width="3.5" height="16" rx="1.75" fill="white"/>
        <rect x="14" y="8" width="3.5" height="16" rx="1.75" fill="white"/>
        <rect x="19" y="8" width="3.5" height="16" rx="1.75" fill="white"/>
        <rect x="24" y="8" width="3.5" height="16" rx="1.75" fill="white"/>
        <polygon points="8,23 27,23 92,91 73,91" fill="white"/>
        <path d="M 73 11 Q 82 7, 92 11 L 92 91 L 73 91 Z" fill="white"/>
        <ellipse cx="58" cy="32" rx="9" ry="11" fill="white"/>
        <ellipse cx="58" cy="31" rx="6" ry="7.5" fill="#C8410B"/>
        <rect x="55" y="41" width="6" height="42" rx="3" fill="white"/>
      </svg>
    </div>
    <h1>Noshbook</h1>
    <p>Track every dish worth remembering. Rate, tag, and revisit your favourite meals.</p>
    <span class="badge">Coming to Google Play</span>
    <div class="links">
      <a class="btn btn-primary" href="mailto:admin@noshbook.io">Get notified at launch</a>
      <a class="btn btn-secondary" href="/privacy.html">Privacy Policy</a>
    </div>
    <footer>
      <a href="mailto:admin@noshbook.io">admin@noshbook.io</a>
    </footer>
  </div>
</body>
</html>
